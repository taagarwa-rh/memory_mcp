services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: .
      dockerfile: Containerfile
    command: ["uv run src/memory_mcp/server.py"]
    ports:
      - "1313:1313"
    environment:
      DB_URI: postgresql://memory:memory@db:5432/memory
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: pg-data
